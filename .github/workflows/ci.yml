# CI: runs on every PR and on every push to main.
# Performs lint check (ruff), runs the full pytest suite with
# real PostgreSQL + Redis service containers, then smoke-builds
# the Docker image to catch Dockerfile regressions early.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.0"

jobs:

  lint-and-test:
    name: Lint & Test (Python ${{ env.PYTHON_VERSION }})
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: simplepass
          POSTGRES_DB: ai_code_review_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_code_review_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Poetry installation
        id: cache-poetry
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: poetry-${{ env.POETRY_VERSION }}-${{ runner.os }}-v1

      - name: Install Poetry
        if: steps.cache-poetry.outputs.cache-hit != 'true'
        run: pip install --upgrade "poetry==${{ env.POETRY_VERSION }}"

      - name: Configure Poetry virtualenv in project
        run: poetry config virtualenvs.in-project true

      - name: Cache Python virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: apps/backend/.venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('apps/backend/pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install project dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --no-interaction

      - name: Ruff lint check
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+psycopg://postgres:simplepass@localhost:5432/ai_code_review_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          CELERY_TASK_ALWAYS_EAGER: "true"
          CELERY_TASK_EAGER_PROPAGATES: "true"
          GITHUB_WEBHOOK_SECRET: ci-test-webhook-secret
          SECRETS_ENCRYPTION_KEY: ""
          SECRETS_BOOTSTRAP_FROM_ENV: "false"
          RBAC_ENFORCEMENT_ENABLED: "false"
          SECRET_SCAN_ENABLED: "true"
          STATIC_ANALYSIS_ENABLED: "false"
          ENV: test
        run: poetry run pytest tests/ -v --tb=short -q

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          dockerfile: apps/backend/Dockerfile
          push: false
          tags: ai-review-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
